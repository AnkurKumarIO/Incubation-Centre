<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Scroll Animation Hook ── */
function useScrollAnimation() {
  useEffect(() => {
    const targets = document.querySelectorAll('.fade-up, .fade-in, .slide-left, .slide-right');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    targets.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

/* ── Side Arc Nav Hook ── */
function useSideNav() {
  useEffect(() => {
    const nav = document.getElementById('arc-nav');
    const items = document.querySelectorAll('.arc-item');
    const trackFill = document.getElementById('arc-track-fill');
    const sectionIds = ['about-hero','about-mission','about-features','about-board','about-governance'];
    const sectionEls = sectionIds.map(id => document.getElementById(id)).filter(Boolean);

    function updateArc() {
      const scrollY = window.pageYOffset + window.innerHeight * 0.4;
      let activeIdx = 0;
      sectionEls.forEach((el, i) => { if (el && el.offsetTop <= scrollY) activeIdx = i; });
      items.forEach((item, i) => item.classList.toggle('arc-active', i === activeIdx));
      if (trackFill) {
        const pct = sectionIds.length > 1 ? (activeIdx / (sectionIds.length - 1)) * 100 : 0;
        trackFill.style.height = pct + '%';
      }
    }

    let scrollTimer;
    const onScroll = () => {
      updateArc();
      if (nav) { nav.classList.add('is-scrolling'); clearTimeout(scrollTimer); scrollTimer = setTimeout(() => nav.classList.remove('is-scrolling'), 350); }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    updateArc();

    items.forEach(item => {
      item.addEventListener('click', e => {
        e.preventDefault();
        const href = item.getAttribute('href');
        if (href && href !== '#') {
          const target = document.querySelector(href);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
}
