<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, (container.clientWidth || window.innerWidth) / (container.clientHeight || window.innerHeight), 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(container.clientWidth || window.innerWidth, container.clientHeight || window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Building Group
const building = new THREE.Group();

// Main structural fins / columns
const finGeometry = new THREE.BoxGeometry(0.1, 5, 2);
const material = new THREE.MeshPhongMaterial({ 
    color: 0x00f0ff, 
    wireframe: true,
    transparent: true,
    opacity: 0.6
});

for(let i = 0; i < 10; i++) {
    const fin = new THREE.Mesh(finGeometry, material);
    fin.position.x = (i - 5) * 1.2;
    fin.rotation.y = Math.PI / 8;
    building.add(fin);
}

// Canopy / Roof structure
const roofGeo = new THREE.PlaneGeometry(12, 4);
const roof = new THREE.Mesh(roofGeo, material);
roof.rotation.x = -Math.PI / 2.5;
roof.position.y = 2.5;
building.add(roof);

scene.add(building);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00f0ff, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

camera.position.z = 10;
camera.position.y = 2;

function animate() {
    requestAnimationFrame(animate);
    building.rotation.y += 0.001;
    // Parallax link (simulated via scroll if needed, here just idle rotation)
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
